<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVPass Studio Monitor Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #111;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            height: 60px;
            box-sizing: border-box;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 0.95rem;
            letter-spacing: 2px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
        }

        .controls input[type="range"] {
            cursor: pointer;
            width: 120px;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        button {
            background-color: #222;
            color: #00ffcc;
            border: 1px solid #333;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #00ffcc;
            color: #000;
        }

        #grid-wrapper {
            flex-grow: 1;
            padding: 6px;
            background-color: #000;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #grid {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .monitor-box {
            background-color: #111;
            border: 1px solid #222;
            position: relative;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        /* Hover Overlay Controls */
        .monitor-controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            padding: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
            border-bottom: 1px solid #333;
        }

        .monitor-box:hover .monitor-controls {
            opacity: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        .monitor-tag {
            font-size: 0.65rem;
            font-family: monospace;
            color: #00ffcc;
        }

        /* Maximize/Solo Mode Styling */
        .monitor-box.maximized {
            position: fixed !important;
            top: 60px !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 60px) !important;
            z-index: 99 !important;
            aspect-ratio: auto !important;
            border: none !important;
            border-radius: 0 !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>TVPass Control Room</h1>
        
        <div class="controls">
            <!-- Preset Layout Buttons -->
            <div class="btn-group">
                <span style="color: #888; align-self: center; margin-right: 5px;">Presets:</span>
                <button onclick="setPreset(4)">2x2 (4)</button>
                <button onclick="setPreset(9)">3x3 (9)</button>
                <button onclick="setPreset(12)">4x3 (12)</button>
                <button onclick="setPreset(16)">4x4 (16)</button>
                <button onclick="setPreset(25)">5x5 (25)</button>
            </div>

            <!-- Custom Slider -->
            <label for="screen-slider">Custom Grid: <span id="screen-count">12</span></label>
            <input type="range" id="screen-slider" min="1" max="100" value="12" step="1" oninput="updateGrid(this.value)">
            
            <button onclick="reloadAll()" style="background-color: #331111; color: #ff3333;">Reload All</button>
        </div>
    </header>

    <div id="grid-wrapper">
        <div id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const countLabel = document.getElementById('screen-count');
        const slider = document.getElementById('screen-slider');

        // MAPPED CHANNELS USING YOUR CLOUDFLARE PROXY + THE AUTOPLAY PARAMETER.
        // You can change or add channels by matching the exact name on the TVPass card.
        const channels = [
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=one sports",  // Screen 1
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=hbo",          // Screen 2
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=cinemax",      // Screen 3
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=sports hd",    // Screen 4
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=gma",          // Screen 5
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=tv5",          // Screen 6
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=axn",          // Screen 7
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=hbo signature",// Screen 8
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=one news",     // Screen 9
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=discovery",    // Screen 10
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=cartoon network", // Screen 11
            "https://solitary-snow-194c.rubix012025.workers.dev/?play=national geographic" // Screen 12
        ];

        // If you increase the slider past your list of channels, we will repeat them
        const defaultUrl = "https://solitary-snow-194c.rubix012025.workers.dev/";

        function setPreset(num) {
            slider.value = num;
            updateGrid(num);
        }

        function reloadAll() {
            if (confirm("Are you sure you want to reload all active streams?")) {
                const iframes = document.querySelectorAll('iframe');
                iframes.forEach(iframe => {
                    iframe.src = iframe.src;
                });
            }
        }

        function updateGrid(numScreens) {
            countLabel.textContent = numScreens;
            grid.innerHTML = ''; 

            // Calculate grid columns dynamically
            let cols = 4; 
            if (numScreens <= 2) cols = 2;
            else if (numScreens <= 4) cols = 2;
            else if (numScreens <= 9) cols = 3;
            else if (numScreens <= 16) cols = 4;
            else if (numScreens <= 25) cols = 5;
            else if (numScreens <= 36) cols = 6;
            else if (numScreens <= 49) cols = 7;
            else if (numScreens <= 64) cols = 8;
            else if (numScreens <= 81) cols = 9;
            else cols = 10;

            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            for (let i = 1; i <= numScreens; i++) {
                const box = document.createElement('div');
                box.className = 'monitor-box';
                box.id = `box-${i}`;

                // Create Control Header (visible on hover)
                const controls = document.createElement('div');
                controls.className = 'monitor-controls';

                const tag = document.createElement('span');
                tag.className = 'monitor-tag';
                
                // Assign URL based on your custom channel array (loops back if screen count exceeds array length)
                const url = channels[(i - 1) % channels.length] || defaultUrl;
                
                // Extract clean channel name for label display
                const urlObj = new URL(url);
                const playParam = urlObj.searchParams.get('play');
                const displayName = playParam ? playParam.toUpperCase() : "LIVE STREAM";
                tag.textContent = `CH ${String(i).padStart(3, '0')}: ${displayName}`;

                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';

                // Edit URL Button
                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit URL';
                editBtn.onclick = () => {
                    const newUrl = prompt(`Enter new URL or play parameter for Screen ${i}:`, iframe.src);
                    if (newUrl) iframe.src = newUrl;
                };

                // Reload Button
                const reloadBtn = document.createElement('button');
                reloadBtn.textContent = 'Reload';
                reloadBtn.onclick = () => {
                    iframe.src = iframe.src;
                };

                // Maximize Button
                const maxBtn = document.createElement('button');
                maxBtn.textContent = 'Maximize';
                maxBtn.onclick = () => {
                    if (box.classList.contains('maximized')) {
                        box.classList.remove('maximized');
                        maxBtn.textContent = 'Maximize';
                        maxBtn.style.backgroundColor = '#222';
                        maxBtn.style.color = '#00ffcc';
                    } else {
                        box.classList.add('maximized');
                        maxBtn.textContent = 'Minimize';
                        maxBtn.style.backgroundColor = '#ff3333';
                        maxBtn.style.color = '#fff';
                    }
                };

                btnGroup.appendChild(editBtn);
                btnGroup.appendChild(reloadBtn);
                btnGroup.appendChild(maxBtn);

                controls.appendChild(tag);
                controls.appendChild(btnGroup);

                // Create Iframe pointing to TVPass through the proxy
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.scrolling = "no"; // DISABLES SCROLLBARS AND WHEEL SCROLL NATIVELY
                iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');

                box.appendChild(controls);
                box.appendChild(iframe);
                grid.appendChild(box);
            }
        }

        // Initialize with default 12 screens
        updateGrid(12);
    </script>
</body>
</html>
